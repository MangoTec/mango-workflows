  <style>
    :root {
      --mango-yellow: #ffce00;
      --mango-ink: #1a1a1a;
      --mango-bg: #f6f7f9;
      --mango-card: #ffffff;
      --mango-muted: #64748b;
      --state-done: #c8f7d0;
      --state-inprogress: #ffe58a;
      --state-ready: #cfe9ff;
      --state-blocked: #eceff3;
      --state-failed: #ffd3d3;
      --state-neutral: #efe7ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #fff7cc 0%, var(--mango-bg) 28%);
      color: var(--mango-ink);
    }
    .topbar {
      background: var(--mango-ink);
      color: white;
      border-bottom: 4px solid var(--mango-yellow);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .brand {
      font-weight: 800;
      letter-spacing: 0.6px;
    }
    .brand span {
      color: var(--mango-yellow);
    }
    .meta {
      font-size: 13px;
      color: #d1d5db;
      text-align: right;
    }
    .wrap {
      max-width: 1300px;
      margin: 18px auto 28px;
      padding: 0 16px;
      display: grid;
      gap: 16px;
    }
    .card {
      background: var(--mango-card);
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
      padding: 14px;
    }
    .section-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    .stat {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: #fcfcfd;
    }
    .stat b {
      display: block;
      font-size: 20px;
      margin-top: 4px;
    }
    .flow {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }
    .wave {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }
    .wave-head {
      padding: 10px 12px;
      background: #fafafa;
      border-bottom: 1px solid #e5e7eb;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chip {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .issues {
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .issue {
      border-radius: 10px;
      padding: 9px;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .issue a { color: inherit; text-decoration: none; }
    .issue a:hover { text-decoration: underline; }
    .issue .title {
      font-size: 13px;
      line-height: 1.25;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .issue .sub {
      font-size: 11px;
      color: var(--mango-muted);
    }
    .done { background: var(--state-done); }
    .inprogress { background: var(--state-inprogress); }
    .ready { background: var(--state-ready); }
    .blocked { background: var(--state-blocked); }
    .failed { background: var(--state-failed); }
    .neutral { background: var(--state-neutral); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid #edf0f2;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #fafafa; font-size: 12px; text-transform: uppercase; color: #475569; }
    .muted { color: var(--mango-muted); }
  </style>
</head>

  <script>
    const data = JSON.parse(document.getElementById('workflow-data').textContent);

    const countByStatus = (status) => data.waves.flatMap(w => w.issues).filter(i => i.statusClass === status).length;
    const totalIssues = data.waves.flatMap(w => w.issues).length;

    document.getElementById('meta').innerHTML = `${data.repo}<br><span class="muted">Updated ${data.generatedAt}</span>`;

    const stats = [
      ['Total Issues', totalIssues],
      ['In Progress', countByStatus('inprogress')],
      ['Ready', countByStatus('ready')],
      ['Blocked', countByStatus('blocked')],
      ['Done', countByStatus('done')],
      ['Open PRs', data.openPrs.length],
    ];
    document.getElementById('stats').innerHTML = stats.map(([k,v]) => `<div class="stat"><div class="muted">${k}</div><b>${v}</b></div>`).join('');

    document.getElementById('flow').innerHTML = data.waves.map((wave) => {
      const gate = wave.gateIssueId ? `<span class="chip">Gate #${wave.gateIssueId}</span>` : '<span class="chip">No gate</span>';
      const issues = wave.issues.map((issue) => {
        return `<div class="issue ${issue.statusClass}">
          <a href="${issue.url}" target="_blank" rel="noreferrer">
            <div class="title">#${issue.number} ${issue.title}</div>
          </a>
          <div class="sub">${issue.state} · ${issue.assignees.join(', ') || 'No assignee'}</div>
        </div>`;
      }).join('');
      return `<div class="wave">
        <div class="wave-head">Wave ${wave.id}${gate}</div>
        <div class="issues">${issues}</div>
      </div>`;
    }).join('');

    if (data.openPrs.length === 0) {
      document.getElementById('prs').innerHTML = '<p class="muted">No open PRs.</p>';
    } else {
      const prRows = data.openPrs.map((pr) => `
        <tr>
          <td>#${pr.number}</td>
          <td><a href="${pr.url}" target="_blank" rel="noreferrer">${pr.title}</a></td>
          <td>${pr.author.login}</td>
          <td>${pr.isDraft ? 'Yes' : 'No'}</td>
          <td>${pr.headRefName} -> ${pr.baseRefName}</td>
        </tr>`).join('');
      document.getElementById('prs').innerHTML = `<table>
        <thead><tr><th>PR</th><th>Title</th><th>Author</th><th>Draft</th><th>Branch</th></tr></thead>
        <tbody>${prRows}</tbody>
      </table>`;
    }

    const runRows = data.recentRuns.flatMap((group) => group.runs.map((run) => ({...run, workflow: group.workflow})));
    if (runRows.length === 0) {
      document.getElementById('runs').innerHTML = '<p class="muted">No runs available.</p>';
    } else {
      document.getElementById('runs').innerHTML = `<table>
        <thead><tr><th>Workflow</th><th>Status</th><th>Conclusion</th><th>Event</th><th>Branch</th><th>When</th></tr></thead>
        <tbody>
          ${runRows.map((run) => `
            <tr>
              <td><a href="${run.url}" target="_blank" rel="noreferrer">${run.workflow}</a></td>
              <td>${run.status}</td>
              <td>${run.conclusion || '-'}</td>
              <td>${run.event}</td>
              <td>${run.headBranch || '-'}</td>
              <td>${new Date(run.createdAt).toLocaleString()}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
    }
  </script>
</body>
</html>

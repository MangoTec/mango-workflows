name: On Issue Close — Check Wave Completion

# Reusable workflow wrapper: when an issue closes,
# delegate to unified gate orchestrator.

on:
  workflow_call:
    inputs:
      closed-issue:
        description: "Issue number that was closed"
        type: string
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  orchestrate:
    uses: ./.github/workflows/gate-orchestrator.yml
    with:
      mode: issue-closed
      issue-number: ${{ inputs.closed-issue }}
    secrets: inherit

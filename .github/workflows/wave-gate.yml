name: Wave Gate — Unlock Next Wave

# Reusable workflow wrapper: when gate:approved label is added,
# delegate to unified gate orchestrator.

on:
  workflow_call:
    inputs:
      gate-issue:
        description: "Issue number that received gate:approved label"
        type: string
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  orchestrate:
    uses: ./.github/workflows/gate-orchestrator.yml
    with:
      mode: gate-approved
      issue-number: ${{ inputs.gate-issue }}
    secrets: inherit

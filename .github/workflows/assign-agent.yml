name: Assign Agent

# Reusable workflow: validates issue spec, routes to AI provider.
# Supports: copilot (assigns user) or codex (dispatches local workflow).
# Level 1: spec linter, provider-override for retry/fallback.

on:
  workflow_call:
    inputs:
      issue-number:
        description: "Issue number that received status:ready"
        type: string
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  assign:
    name: Validate & route to agent
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      actions: write

    steps:
      - name: Checkout (caller's repo)
        uses: actions/checkout@v4

      - name: Checkout workflow libs
        uses: actions/checkout@v4
        with:
          repository: MangoTec/mango-workflows
          path: .mango-workflows
          sparse-checkout: lib

      - name: Resolve mission config
        id: config
        env:
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        run: |
          source .mango-workflows/lib/mission.sh
          source .mango-workflows/lib/config.sh

          MISSIONS_DIR=".github/missions"

          RESOLVED=$(cfg_resolve_for_issue "$MISSIONS_DIR" "$ISSUE_NUMBER") || {
            echo "::error::Issue #$ISSUE_NUMBER not found in any active mission under $MISSIONS_DIR"
            exit 1
          }
          CONFIG_PATH=$(echo "$RESOLVED" | head -1)
          MISSION_ID=$(echo "$RESOLVED" | tail -1)

          echo "config_path=$CONFIG_PATH" >> "$GITHUB_OUTPUT"
          echo "mission_id=$MISSION_ID" >> "$GITHUB_OUTPUT"

          # Mission metadata
          echo "mission_branch=$(mission_get_branch "$MISSIONS_DIR" "$MISSION_ID")" >> "$GITHUB_OUTPUT"
          echo "base_branch=$(mission_get_base_branch "$MISSIONS_DIR" "$MISSION_ID")" >> "$GITHUB_OUTPUT"
          echo "spec_source=$(mission_get_spec_source "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"

          # Agent config
          echo "primary=$(cfg_primary_provider "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"
          echo "fallback=$(cfg_fallback_provider "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"
          echo "max_retries=$(cfg_max_retries "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"

          # Copilot
          echo "copilot_user=$(jq -r '.agent.providers.copilot.username // "Copilot"' "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"

          # Codex
          echo "codex_model=$(jq -r '.agent.providers.codex.model // "gpt-5.4"' "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"
          echo "codex_effort=$(jq -r '.agent.providers.codex.effort // "medium"' "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"
          echo "codex_sandbox=$(jq -r '.agent.providers.codex.sandbox // "workspace-write"' "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"
          echo "codex_prompt=$(jq -r '.agent.providers.codex.promptTemplate // ".github/codex/prompts/implement.md"' "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"

          # Spec linter
          echo "min_body=$(jq -r '.specLinter.minBodyLength // 200' "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"
          SECTIONS=$(jq -r '(.specLinter.requiredSections // ["Requirements","Acceptance Criteria"]) | join("|")' "$CONFIG_PATH")
          echo "required_sections=$SECTIONS" >> "$GITHUB_OUTPUT"
          echo "validate_file_refs=$(jq -r '.specLinter.validateFileRefs // false' "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"
          echo "require_spec_source=$(jq -r '.specLinter.requireSpecSource // false' "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"

          # Autonomy
          echo "auto_assign=$(jq -r '.autonomy.autoAssignAgent // true' "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"
          echo "autonomy=$(jq -r '.autonomy.level // "human-gate-pr"' "$CONFIG_PATH")" >> "$GITHUB_OUTPUT"

          echo "Resolved: mission=$MISSION_ID, config=$CONFIG_PATH, branch=$(mission_get_branch "$MISSIONS_DIR" "$MISSION_ID")"

      - name: Determine provider
        id: provider
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          PRIMARY: ${{ steps.config.outputs.primary }}
        run: |
          # Check for provider-override label (set by agent-retry on fallback)
          OVERRIDE=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '[.labels[].name | select(startswith("provider-override:"))] | first // empty' | sed 's/provider-override://')

          if [ -n "$OVERRIDE" ]; then
            echo "provider=$OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "Provider override: $OVERRIDE"
            gh issue edit "$ISSUE_NUMBER" --remove-label "provider-override:$OVERRIDE" 2>/dev/null || true
          else
            echo "provider=$PRIMARY" >> "$GITHUB_OUTPUT"
            echo "Primary provider: $PRIMARY"
          fi

      - name: Spec linter
        id: spec
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          MIN_BODY: ${{ steps.config.outputs.min_body }}
          REQUIRED_SECTIONS: ${{ steps.config.outputs.required_sections }}
          VALIDATE_FILE_REFS: ${{ steps.config.outputs.validate_file_refs }}
          REQUIRE_SPEC_SOURCE: ${{ steps.config.outputs.require_spec_source }}
          MISSION_ID: ${{ steps.config.outputs.mission_id }}
          SPEC_SOURCE: ${{ steps.config.outputs.spec_source }}
          MISSION_BRANCH: ${{ steps.config.outputs.mission_branch }}
        run: |
          BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          BODY_LENGTH=${#BODY}
          ERRORS=""

          # Check minimum body length
          if [ "$BODY_LENGTH" -lt "$MIN_BODY" ]; then
            ERRORS="$ERRORS- Body too short (${BODY_LENGTH} chars, minimum: ${MIN_BODY})\n"
          fi

          # Check required sections
          IFS='|' read -ra SECTIONS <<< "$REQUIRED_SECTIONS"
          for section in "${SECTIONS[@]}"; do
            if ! echo "$BODY" | grep -qiE "^#{1,3} *${section}"; then
              ERRORS="$ERRORS- Missing required section: **${section}**\n"
            fi
          done

          # v4: Validate file references in spec body
          if [ "$VALIDATE_FILE_REFS" = "true" ]; then
            # Extract file paths from markdown code blocks and backtick references
            FILE_REFS=$(echo "$BODY" | grep -oE '`[a-zA-Z0-9_./-]+\.(ts|tsx|js|jsx|php|yml|yaml|json|md|css|html)`' | tr -d '`' | sort -u)
            for ref in $FILE_REFS; do
              if [ ! -f "$ref" ]; then
                ERRORS="$ERRORS- Referenced file not found in repo: \`$ref\`\n"
              fi
            done
          fi

          # v4: Require spec to mention mission source-of-truth
          if [ "$REQUIRE_SPEC_SOURCE" = "true" ] && [ -n "$SPEC_SOURCE" ]; then
            if ! echo "$BODY" | grep -qF "$SPEC_SOURCE"; then
              ERRORS="$ERRORS- Spec does not reference mission source-of-truth: \`$SPEC_SOURCE\`\n"
            fi
          fi

          if [ -n "$ERRORS" ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            COMMENT=$(printf "⚠️ **Spec Linter**: Issue doesn't meet agent requirements.\n\n%b\nFix the spec and re-add \`status:ready\`." "$ERRORS")
            gh issue comment "$ISSUE_NUMBER" --body "$COMMENT"
            gh issue edit "$ISSUE_NUMBER" --remove-label "status:ready" --add-label "status:spec-invalid" 2>/dev/null || true
          else
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "Spec OK (${BODY_LENGTH} chars, mission: ${MISSION_ID:-none})"
          fi

      - name: Skip — manual mode
        if: steps.config.outputs.autonomy == 'manual-stages' && steps.spec.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "🟢 **Pipeline**: Issue ready. Autonomy is \`manual-stages\` — assign agent manually."

      # ─── Provider: Copilot ───
      - name: Instruct Copilot target branch and TDD
        if: >
          steps.spec.outputs.valid == 'true' &&
          steps.config.outputs.auto_assign == 'true' &&
          steps.config.outputs.autonomy != 'manual-stages' &&
          steps.provider.outputs.provider == 'copilot'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          MISSION_BRANCH: ${{ steps.config.outputs.mission_branch }}
          CONFIG_PATH: ${{ steps.config.outputs.config_path }}
        run: |
          # Copilot reads issue comments for context — this MUST come before assignment

          # 1. Resolve testing instructions from mission config or auto-detect
          TESTING_INSTRUCTIONS=$(jq -r '.testing.instructions // empty' "$CONFIG_PATH" 2>/dev/null)

          if [ -z "$TESTING_INSTRUCTIONS" ]; then
            # Auto-detect test framework from repo files
            if [ -f "vitest.config.ts" ] || [ -f "vitest.config.mts" ]; then
              TESTING_INSTRUCTIONS=$(cat <<'VITEST_RULES'
          **Testing (TDD — mandatory)**:
          Every file you create or modify MUST have a corresponding test. Follow these rules:
          - New Zod schemas → Vitest unit test (validation happy + error paths)
          - New TypeScript types/constants → Vitest unit test verifying exports and structure
          - New config files (routes, permissions) → Vitest unit test for route definitions and permission mappings
          - New server actions → Vitest unit test (success + error + validation failure)
          - New hooks → Vitest unit test (jsdom project, state transitions)
          - New components → Storybook story (default + variants + edge states)
          Place unit tests in `src/features/[feature]/__tests__/[module].test.ts`.
          Use descriptive test names: `it('should ...')`.
          VITEST_RULES
              )
            elif [ -f "jest.config.js" ] || [ -f "jest.config.ts" ] || [ -f "jest.config.mjs" ]; then
              TESTING_INSTRUCTIONS=$(cat <<'JEST_RULES'
          **Testing (TDD — mandatory)**:
          Every file you create or modify MUST have a corresponding test. Follow these rules:
          - New services/lib → Jest unit test (happy + error paths)
          - New controllers/routes → Jest integration test (request + response)
          - New middleware → Jest unit test
          - Mock external APIs with jest.mock() — never make real HTTP requests in tests.
          Place tests next to source files as `[module].test.js` or in `__tests__/` directories.
          Use descriptive test names: `it('should ...')`.
          JEST_RULES
              )
            elif [ -f "phpunit.xml" ] || [ -f "phpunit.xml.dist" ]; then
              TESTING_INSTRUCTIONS=$(cat <<'PHPUNIT_RULES'
          **Testing (TDD — mandatory)**:
          Every file you create or modify MUST have a corresponding test. Follow these rules:
          - New service methods → PHPUnit unit test in tests/Unit/
          - New API endpoints → PHPUnit feature test in tests/Feature/ (request + response assertion)
          - New models/scopes → PHPUnit unit test for relationships and scopes
          - Mock external APIs with Http::fake() — never make real HTTP requests in tests.
          Use descriptive test names: `test_payment_creation_fails_when_credit_limit_exceeded`.
          PHPUNIT_RULES
              )
            else
              TESTING_INSTRUCTIONS="**Testing**: If this repo has tests, include tests for your changes."
            fi
          fi

          # 2. Build the full comment
          COMMENT=$(cat <<INSTRUCTIONS
          ⚠️ **IMPORTANT — Mandatory Instructions**

          **Target Branch**: Your PR MUST target the branch \`$MISSION_BRANCH\` (NOT \`main\`).
          Include \`Closes #$ISSUE_NUMBER\` in the PR body.

          $TESTING_INSTRUCTIONS

          Do NOT skip tests. A PR without tests will be rejected.
          INSTRUCTIONS
          )
          gh issue comment "$ISSUE_NUMBER" --body "$COMMENT"

      - name: Assign Copilot
        if: >
          steps.spec.outputs.valid == 'true' &&
          steps.config.outputs.auto_assign == 'true' &&
          steps.config.outputs.autonomy != 'manual-stages' &&
          steps.provider.outputs.provider == 'copilot'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_PAT_PORTAL: ${{ secrets.GH_PAT_PORTAL }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          AGENT_USER: ${{ steps.config.outputs.copilot_user }}
        run: |
          TOKEN="${GH_PAT_PORTAL:-$GH_TOKEN}"
          GH_TOKEN="$TOKEN" gh issue edit "$ISSUE_NUMBER" --add-assignee "$AGENT_USER" \
            || echo "::warning::Failed to assign $AGENT_USER"

      # ─── Provider: Codex ───
      - name: Trigger Codex
        if: >
          steps.spec.outputs.valid == 'true' &&
          steps.config.outputs.auto_assign == 'true' &&
          steps.config.outputs.autonomy != 'manual-stages' &&
          steps.provider.outputs.provider == 'codex'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        run: |
          gh workflow run codex-implement.yml \
            -R "${{ github.repository }}" \
            -f issue_number="$ISSUE_NUMBER" \
            -f model="${{ steps.config.outputs.codex_model }}" \
            -f effort="${{ steps.config.outputs.codex_effort }}" \
            -f sandbox="${{ steps.config.outputs.codex_sandbox }}" \
            -f prompt_template="${{ steps.config.outputs.codex_prompt }}"

      # ─── Labels & Slack ───
      - name: Update labels & notify
        if: >
          steps.spec.outputs.valid == 'true' &&
          steps.config.outputs.auto_assign == 'true' &&
          steps.config.outputs.autonomy != 'manual-stages'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          PROVIDER: ${{ steps.provider.outputs.provider }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.DEPLOYMENTS_SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "status:ready" \
            --add-label "status:in-progress"

          TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          REPO_NAME="${{ github.repository }}"
          ISSUE_URL="https://github.com/${{ github.repository }}/issues/${ISSUE_NUMBER}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$PROVIDER" = "copilot" ]; then
            MISSION_BRANCH="${{ steps.config.outputs.mission_branch }}"
            # Informational comment for humans (assignment handled by dedicated step above)
            gh issue comment "$ISSUE_NUMBER" --body "$(printf '🤖 **Pipeline**: Assigned `Copilot` to implement this issue (mission: `%s`, target branch: `%s`).' "${{ steps.config.outputs.mission_id }}" "$MISSION_BRANCH")"
            EMOJI="🤖"
            PROVIDER_LABEL="Copilot"
          elif [ "$PROVIDER" = "codex" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "🧠 **Pipeline**: Codex dispatched (model: ${{ steps.config.outputs.codex_model }})."
            EMOJI="🧠"
            PROVIDER_LABEL="Codex"
          else
            gh issue comment "$ISSUE_NUMBER" --body "⚠️ **Pipeline**: Unknown provider \`$PROVIDER\`."
            EMOJI="⚠️"
            PROVIDER_LABEL="$PROVIDER"
          fi

          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            MISSION_ID="${{ steps.config.outputs.mission_id }}"
            SLACK_MSG=$(printf '%s\n' \
              "${EMOJI} *Pipeline en progreso — agente asignado*" \
              "• Repo: \`${REPO_NAME}\`" \
              "• Misión: \`${MISSION_ID}\`" \
              "• Issue: <${ISSUE_URL}|#${ISSUE_NUMBER}> — ${TITLE}" \
              "• Provider: ${PROVIDER_LABEL}" \
              "• Actor: @${{ github.actor }}" \
              "• Run: <${RUN_URL}|ver ejecución>" \
              "• Estado: \`status:in-progress\`")
            curl -sf -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\": $(echo "$SLACK_MSG" | jq -Rs .)}" || true
          fi

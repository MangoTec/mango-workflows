name: Wave Ready — Create Consolidated PR

# Reusable workflow:
# - before merge: when all task PRs in a wave are green, create/refresh a consolidated PR
# - after merge: close wave issues, run gate behavior, unlock the next wave or create final PR

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-wave-pr:
    name: Sync consolidated wave PR
    runs-on: ubuntu-latest
    concurrency:
      group: wave-ready-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      issues: write
      contents: write
      pull-requests: write
      statuses: read
      checks: read

    steps:
      - name: Checkout (caller's repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout workflow libs
        uses: actions/checkout@v4
        with:
          repository: MangoTec/mango-workflows
          path: .mango-workflows
          sparse-checkout: lib

      - name: Setup Node.js for verification
        if: ${{ hashFiles('.nvmrc') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Create, update, or finalize consolidated PRs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_PAT_PORTAL: ${{ secrets.GH_PAT_PORTAL }}
          SLACK_WEBHOOK_URL: ${{ secrets.MANGO_TL_REMINDERS_SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
        run: bash .mango-workflows/lib/wave-ready.sh

name: Gate Orchestrator

# Reusable workflow that centralizes gate logic for both triggers:
# - issue-closed: checks wave completion and requests gate approval or unlocks next wave
# - gate-approved: unlocks next wave and closes gate issue

on:
  workflow_call:
    inputs:
      mode:
        description: "Execution mode: issue-closed or gate-approved"
        type: string
        required: true
      issue-number:
        description: "Issue number to process (closed issue or gate issue depending on mode)"
        type: string
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  orchestrate:
    name: Run gate orchestration
    runs-on: ubuntu-latest
    concurrency:
      group: gate-orchestrator-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout (caller's repo)
        uses: actions/checkout@v4

      - name: Checkout workflow libs
        uses: actions/checkout@v4
        with:
          repository: MangoTec/mango-workflows
          path: .mango-workflows
          sparse-checkout: lib

      - name: Execute mode
        env:
          GH_TOKEN: ${{ github.token }}
          GH_PAT_PORTAL: ${{ secrets.GH_PAT_PORTAL }}
          MODE: ${{ inputs.mode }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          SLACK_WEBHOOK_URL: ${{ secrets.MANGO_TL_REMINDERS_SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
        run: |
          set -euo pipefail

          source .mango-workflows/lib/mission.sh
          source .mango-workflows/lib/config.sh
          source .mango-workflows/lib/waves.sh

          MISSIONS_DIR=".github/missions"
          TOKEN="${GH_PAT_PORTAL:-$GH_TOKEN}"
          REPO_NAME=$(basename "${{ github.repository }}")

          if [ "$MODE" = "gate-approved" ]; then
            GATE_ISSUE="$ISSUE_NUMBER"

            # Find mission by scanning waveGates across all active missions
            CONFIG=""
            GATE_WAVE=""
            for f in "$MISSIONS_DIR"/*.json; do
              [ -f "$f" ] || continue
              local_status=$(jq -r '.mission.status // "active"' "$f")
              [ "$local_status" = "active" ] || continue
              for wave in $(jq -r '.waveGates | keys[]' "$f" 2>/dev/null); do
                GATE_NUM=$(jq -r ".waveGates[\"$wave\"] // empty" "$f")
                if [ "$GATE_NUM" = "$GATE_ISSUE" ]; then
                  GATE_WAVE="$wave"
                  CONFIG="$f"
                  break 2
                fi
              done
            done

            if [ -z "$CONFIG" ] || [ -z "$GATE_WAVE" ]; then
              TITLE=$(gh issue view "$GATE_ISSUE" --json title --jq '.title')
              GATE_WAVE=$(echo "$TITLE" | grep -oP 'Wave \K\d+' || true)
              echo "::error::Cannot determine mission/wave for gate issue #$GATE_ISSUE"
              exit 1
            fi

            MISSION_ID=$(jq -r '.mission.id' "$CONFIG")

            NEXT_WAVE=$((GATE_WAVE + 1))
            if ! jq -e ".waves[\"$NEXT_WAVE\"]" "$CONFIG" > /dev/null 2>&1; then
              # All waves complete â€” create final unified PR: mission branch â†’ base branch
              MISSION_BRANCH=$(jq -r '.mission.missionBranch' "$CONFIG")
              BASE_BRANCH=$(jq -r '.mission.baseBranch // "main"' "$CONFIG")

              # Collect all issues across all waves for the PR body
              ALL_ISSUES=""
              for wave in $(jq -r '.waves | keys[]' "$CONFIG"); do
                W_IS_OBJ=$(jq -r ".waves[\"$wave\"] | type" "$CONFIG")
                if [ "$W_IS_OBJ" = "object" ]; then
                  W_ISSUES=$(jq -r ".waves[\"$wave\"].issues[]" "$CONFIG")
                else
                  W_ISSUES=$(jq -r ".waves[\"$wave\"][]" "$CONFIG")
                fi
                for i in $W_ISSUES; do
                  ALL_ISSUES="${ALL_ISSUES}- Closes #${i}"$'\n'
                done
              done

              PR_TITLE="feat(${MISSION_ID}): complete mission"
              PR_BODY=$(printf '## Mission `%s` â€” Final PR\n\nAll waves complete. This PR merges the full mission branch into `%s`.\n\n### Issues included\n%s\n### Review\nReview the combined changes, approve, and merge.' "$MISSION_ID" "$BASE_BRANCH" "$ALL_ISSUES")

              UNIFIED_PR=$(GH_TOKEN="$TOKEN" gh pr create \
                --base "$BASE_BRANCH" \
                --head "$MISSION_BRANCH" \
                --title "$PR_TITLE" \
                --body "$PR_BODY" 2>&1) || {
                echo "::warning::Could not create final PR (may already exist): $UNIFIED_PR"
                UNIFIED_PR=$(GH_TOKEN="$TOKEN" gh pr list --base "$BASE_BRANCH" --head "$MISSION_BRANCH" --json url --jq '.[0].url // empty')
              }

              GH_TOKEN="$TOKEN" gh issue comment "$GATE_ISSUE" --body "đźŽŠ **All waves complete!** Final PR created: $UNIFIED_PR"

              if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
                GATE_URL="https://github.com/${{ github.repository }}/issues/${GATE_ISSUE}"
                MSG=$(printf '%s\n' \
                  "đźŽŠ *MisiĂłn completa â€” PR final creado*" \
                  "â€˘ Repo: \`${REPO_NAME}\`" \
                  "â€˘ MisiĂłn: \`${MISSION_ID}\`" \
                  "â€˘ PR: ${UNIFIED_PR}" \
                  "â€˘ AcciĂłn: revisar y mergear a \`${BASE_BRANCH}\`")
                curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                  -H "Content-Type: application/json" \
                  -d "{\"text\": $(echo "$MSG" | jq -Rs .)}" || true
              fi

              exit 0
            fi

            # v4: waves can be objects with .issues array, or v3 plain arrays
            NEXT_IS_OBJECT=$(jq -r ".waves[\"$NEXT_WAVE\"] | type" "$CONFIG")
            if [ "$NEXT_IS_OBJECT" = "object" ]; then
              NEXT_ISSUES=$(jq -r ".waves[\"$NEXT_WAVE\"].issues[]" "$CONFIG")
            else
              NEXT_ISSUES=$(jq -r ".waves[\"$NEXT_WAVE\"][]" "$CONFIG")
            fi
            UNLOCKED=""

            for issue_num in $NEXT_ISSUES; do
              GH_TOKEN="$TOKEN" gh issue edit "$issue_num" \
                --remove-label "status:blocked" \
                --add-label "status:ready" 2>/dev/null || true
              UNLOCKED="$UNLOCKED #$issue_num"
            done

            if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
              ISSUE_COUNT=$(echo $UNLOCKED | wc -w | tr -d ' ')
              GATE_URL="https://github.com/${{ github.repository }}/issues/${GATE_ISSUE}"
              RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              MSG=$(printf '%s\n' \
                "đźš€ *Wave ${NEXT_WAVE} desbloqueada*" \
                "â€˘ Repo: \`${REPO_NAME}\`" \
                "â€˘ Gate: <${GATE_URL}|#${GATE_ISSUE}> (aprobada)" \
                "â€˘ Issues listas: ${ISSUE_COUNT}" \
                "â€˘ Estado aplicado: \`status:ready\`" \
                "â€˘ Run: <${RUN_URL}|ver ejecuciĂłn>")
              curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "{\"text\": $(echo "$MSG" | jq -Rs .)}" || true
            fi

            GH_TOKEN="$TOKEN" gh issue comment "$GATE_ISSUE" --body "đźš€ **Wave $NEXT_WAVE unlocked!** Issues now ready:$UNLOCKED"
            GH_TOKEN="$TOKEN" gh issue close "$GATE_ISSUE" --reason completed
            exit 0
          fi

          if [ "$MODE" = "issue-closed" ]; then            # Resolve mission config for this issue
            RESOLVED=$(cfg_resolve_for_issue "$MISSIONS_DIR" "$ISSUE_NUMBER" 2>/dev/null) || {
              echo "Issue #$ISSUE_NUMBER not found in any active mission â€” skipping"
              exit 0
            }
            CONFIG=$(echo "$RESOLVED" | head -1)
            MISSION_ID=$(echo "$RESOLVED" | tail -1)            CLOSED_ISSUE="$ISSUE_NUMBER"

            # Determine wave for closed issue
            CLOSED_WAVE=""
            for wave in $(jq -r '.waves | keys[]' "$CONFIG"); do
              # v4: waves can be objects with .issues array, or v3 plain arrays
              IS_OBJECT=$(jq -r ".waves[\"$wave\"] | type" "$CONFIG")
              if [ "$IS_OBJECT" = "object" ]; then
                MATCH=$(jq -e ".waves[\"$wave\"].issues | index($CLOSED_ISSUE)" "$CONFIG" >/dev/null 2>&1 && echo "yes" || echo "no")
              else
                MATCH=$(jq -e ".waves[\"$wave\"] | index($CLOSED_ISSUE)" "$CONFIG" >/dev/null 2>&1 && echo "yes" || echo "no")
              fi
              if [ "$MATCH" = "yes" ]; then
                CLOSED_WAVE="$wave"
                break
              fi
            done

            if [ -z "$CLOSED_WAVE" ]; then
              echo "Issue #$CLOSED_ISSUE not in any wave."
              exit 0
            fi

            # Get issues for this wave (v4 object or v3 array)
            IS_OBJECT=$(jq -r ".waves[\"$CLOSED_WAVE\"] | type" "$CONFIG")
            if [ "$IS_OBJECT" = "object" ]; then
              WAVE_ISSUES=$(jq -r ".waves[\"$CLOSED_WAVE\"].issues[]" "$CONFIG")
            else
              WAVE_ISSUES=$(jq -r ".waves[\"$CLOSED_WAVE\"][]" "$CONFIG")
            fi

            ALL_CLOSED=true
            for issue_num in $WAVE_ISSUES; do
              STATE=$(gh issue view "$issue_num" --json state --jq '.state')
              if [ "$STATE" != "CLOSED" ]; then
                ALL_CLOSED=false
              fi
            done

            if [ "$ALL_CLOSED" != "true" ]; then
              exit 0
            fi

            NEXT_WAVE=$((CLOSED_WAVE + 1))
            if ! jq -e ".waves[\"$NEXT_WAVE\"]" "$CONFIG" > /dev/null 2>&1; then
              # Last wave completed â€” create final PR: mission branch â†’ base branch
              MISSION_BRANCH=$(jq -r '.mission.missionBranch' "$CONFIG")
              BASE_BRANCH=$(jq -r '.mission.baseBranch // "main"' "$CONFIG")

              ALL_ISSUES=""
              for wave in $(jq -r '.waves | keys[]' "$CONFIG"); do
                W_IS_OBJ=$(jq -r ".waves[\"$wave\"] | type" "$CONFIG")
                if [ "$W_IS_OBJ" = "object" ]; then
                  W_ISSUES=$(jq -r ".waves[\"$wave\"].issues[]" "$CONFIG")
                else
                  W_ISSUES=$(jq -r ".waves[\"$wave\"][]" "$CONFIG")
                fi
                for i in $W_ISSUES; do
                  ALL_ISSUES="${ALL_ISSUES}- Closes #${i}"$'\n'
                done
              done

              PR_TITLE="feat(${MISSION_ID}): complete mission"
              PR_BODY=$(printf '## Mission `%s` â€” Final PR\n\nAll waves complete. This PR merges the full mission branch into `%s`.\n\n### Issues included\n%s\n### Review\nReview the combined changes, approve, and merge.' "$MISSION_ID" "$BASE_BRANCH" "$ALL_ISSUES")

              UNIFIED_PR=$(GH_TOKEN="$TOKEN" gh pr create \
                --base "$BASE_BRANCH" \
                --head "$MISSION_BRANCH" \
                --title "$PR_TITLE" \
                --body "$PR_BODY" 2>&1) || {
                echo "::warning::Could not create final PR (may already exist): $UNIFIED_PR"
                UNIFIED_PR=$(GH_TOKEN="$TOKEN" gh pr list --base "$BASE_BRANCH" --head "$MISSION_BRANCH" --json url --jq '.[0].url // empty')
              }

              echo "đźŽŠ All waves complete! Final PR: $UNIFIED_PR"

              if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
                MSG=$(printf '%s\n' \
                  "đźŽŠ *MisiĂłn completa â€” PR final creado*" \
                  "â€˘ Repo: \`${REPO_NAME}\`" \
                  "â€˘ MisiĂłn: \`${MISSION_ID}\`" \
                  "â€˘ PR: ${UNIFIED_PR}" \
                  "â€˘ AcciĂłn: revisar y mergear a \`${BASE_BRANCH}\`")
                curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                  -H "Content-Type: application/json" \
                  -d "{\"text\": $(echo "$MSG" | jq -Rs .)}" || true
              fi

              exit 0
            fi

            # Get next wave issues (v4 or v3)
            NEXT_IS_OBJECT=$(jq -r ".waves[\"$NEXT_WAVE\"] | type" "$CONFIG")
            if [ "$NEXT_IS_OBJECT" = "object" ]; then
              NEXT_ISSUES=$(jq -r ".waves[\"$NEXT_WAVE\"].issues[]" "$CONFIG")
            else
              NEXT_ISSUES=$(jq -r ".waves[\"$NEXT_WAVE\"][]" "$CONFIG")
            fi

            # Determine gate type for closed wave
            # v4: per-wave gate config; v3 fallback: autonomy.waveGateRequired
            GATE_TYPE=""
            if [ "$IS_OBJECT" = "object" ]; then
              GATE_TYPE=$(jq -r ".waves[\"$CLOSED_WAVE\"].gate // empty" "$CONFIG")
            fi
            if [ -z "$GATE_TYPE" ]; then
              # v3 fallback
              WAVE_GATE_REQUIRED=$(jq -r '.autonomy.waveGateRequired // true' "$CONFIG")
              if [ "$WAVE_GATE_REQUIRED" = "true" ]; then
                GATE_TYPE="human"
              else
                GATE_TYPE="auto"
              fi
            fi

            echo "Wave $CLOSED_WAVE complete. Gate type: $GATE_TYPE"

            if [ "$GATE_TYPE" = "human" ]; then
              # Human gate: notify on gate issue, wait for gate:approved label
              # NO PR to main here â€” only at the end of ALL waves
              GATE_ISSUE=$(jq -r ".waveGates[\"$CLOSED_WAVE\"] // empty" "$CONFIG")
              MISSION_BRANCH=$(jq -r '.mission.missionBranch' "$CONFIG")

              if [ -n "$GATE_ISSUE" ] && [ "$GATE_ISSUE" != "null" ]; then
                NEXT_LIST=$(echo $NEXT_ISSUES | tr ' ' ', ' | sed 's/,/, #/g; s/^/#/')
                DIFF_URL="https://github.com/${{ github.repository }}/compare/${MISSION_BRANCH}~..${MISSION_BRANCH}"
                BODY="âś… **Wave $CLOSED_WAVE complete!** All issues merged to \`$MISSION_BRANCH\`."
                BODY="$BODY"$'\n\n'"đź”Ť **Review changes**: [view diff on mission branch]($DIFF_URL)"
                BODY="$BODY"$'\n\n'"Next wave (Wave $NEXT_WAVE): $NEXT_LIST"
                BODY="$BODY"$'\n\n'"When ready, add \`gate:approved\` label to this issue to unlock Wave $NEXT_WAVE."
                GH_TOKEN="$TOKEN" gh issue comment "$GATE_ISSUE" --body "$BODY"

                if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
                  GATE_URL="https://github.com/${{ github.repository }}/issues/${GATE_ISSUE}"
                  RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  NEXT_COUNT=$(echo $NEXT_ISSUES | wc -w | tr -d ' ')
                  MSG=$(printf '%s\n' \
                    "đźźˇ *AcciĂłn requerida â€” gate pendiente*" \
                    "â€˘ Repo: \`${REPO_NAME}\`" \
                    "â€˘ Wave completada: ${CLOSED_WAVE}" \
                    "â€˘ PrĂłxima wave: ${NEXT_WAVE} (${NEXT_COUNT} issues)" \
                    "â€˘ Gate: <${GATE_URL}|#${GATE_ISSUE}>" \
                    "â€˘ AcciĂłn: agregar label \`gate:approved\`" \
                    "â€˘ Run: <${RUN_URL}|ver ejecuciĂłn>")
                  curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                    -H "Content-Type: application/json" \
                    -d "{\"text\": $(echo "$MSG" | jq -Rs .)}" || true
                fi
              fi

            elif [ "$GATE_TYPE" = "verify-then-auto" ]; then
              # Run verification hooks, then auto-unlock if pass
              VERIFY_HOOKS=""
              if [ "$IS_OBJECT" = "object" ]; then
                VERIFY_HOOKS=$(jq -r '(.waves["'"$CLOSED_WAVE"'"].verify // []) | .[]' "$CONFIG" 2>/dev/null || true)
              fi

              VERIFY_PASSED=true
              VERIFY_ERRORS=""

              if [ -n "$VERIFY_HOOKS" ]; then
                if [ -f package.json ]; then
                  if [ -f package-lock.json ]; then
                    INSTALL_CMD="npm ci --prefer-offline --no-audit"
                  else
                    INSTALL_CMD="npm install --no-audit"
                  fi

                  echo "Installing dependencies for verification: $INSTALL_CMD"
                  set +e
                  INSTALL_OUTPUT=$(eval "$INSTALL_CMD" 2>&1)
                  INSTALL_EXIT=$?
                  set -e

                  if [ "$INSTALL_EXIT" -ne 0 ]; then
                    VERIFY_PASSED=false
                    VERIFY_ERRORS="$VERIFY_ERRORS\n### âťŚ \`install\` failed (exit $INSTALL_EXIT)\n\`\`\`\n$(echo "$INSTALL_OUTPUT" | tail -50)\n\`\`\`\n"
                  else
                    echo "$INSTALL_OUTPUT" | tail -20
                  fi
                fi

                for hook_name in $VERIFY_HOOKS; do
                  if [ "$VERIFY_PASSED" != "true" ]; then
                    break
                  fi

                  HOOK_CMD=$(jq -r ".verification.hooks[\"$hook_name\"] // empty" "$CONFIG")
                  if [ -z "$HOOK_CMD" ]; then
                    echo "::warning::Verify hook '$hook_name' not found in verification.hooks"
                    continue
                  fi

                  echo "Running verify hook: $hook_name â†’ $HOOK_CMD"
                  set +e
                  HOOK_OUTPUT=$(eval "$HOOK_CMD" 2>&1)
                  HOOK_EXIT=$?
                  set -e

                  if [ "$HOOK_EXIT" -ne 0 ]; then
                    VERIFY_PASSED=false
                    VERIFY_ERRORS="$VERIFY_ERRORS\n### âťŚ \`$hook_name\` failed (exit $HOOK_EXIT)\n\`\`\`\n$(echo "$HOOK_OUTPUT" | tail -50)\n\`\`\`\n"
                  else
                    echo "âś… $hook_name passed"
                  fi
                done
              fi

              if [ "$VERIFY_PASSED" = "true" ]; then
                # All hooks passed â€” auto-unlock next wave
                for issue_num in $NEXT_ISSUES; do
                  GH_TOKEN="$TOKEN" gh issue edit "$issue_num" \
                    --remove-label "status:blocked" \
                    --add-label "status:ready" 2>/dev/null || true
                done

                if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
                  NEXT_COUNT=$(echo $NEXT_ISSUES | wc -w | tr -d ' ')
                  RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  MSG=$(printf '%s\n' \
                    "đźź˘ *Wave ${NEXT_WAVE} auto-desbloqueada (verificaciĂłn OK)*" \
                    "â€˘ Repo: \`${REPO_NAME}\`" \
                    "â€˘ Wave completada: ${CLOSED_WAVE}" \
                    "â€˘ VerificaciĂłn: todas las hooks pasaron" \
                    "â€˘ Issues listas: ${NEXT_COUNT}" \
                    "â€˘ Run: <${RUN_URL}|ver ejecuciĂłn>")
                  curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                    -H "Content-Type: application/json" \
                    -d "{\"text\": $(echo "$MSG" | jq -Rs .)}" || true
                fi

                # Close gate issue if exists
                GATE_ISSUE=$(jq -r ".waveGates[\"$CLOSED_WAVE\"] // empty" "$CONFIG")
                if [ -n "$GATE_ISSUE" ] && [ "$GATE_ISSUE" != "null" ]; then
                  GH_TOKEN="$TOKEN" gh issue comment "$GATE_ISSUE" --body "đźź˘ **Wave $CLOSED_WAVE verified and auto-approved.** Wave $NEXT_WAVE unlocked."
                  GH_TOKEN="$TOKEN" gh issue close "$GATE_ISSUE" --reason completed 2>/dev/null || true
                fi
              else
                # Verification failed â€” re-open wave issues with error context for agents to fix
                printf "Verification failed for wave $CLOSED_WAVE. Errors:\n$VERIFY_ERRORS"

                for issue_num in $WAVE_ISSUES; do
                  STATE=$(gh issue view "$issue_num" --json state --jq '.state')
                  if [ "$STATE" = "CLOSED" ]; then
                    GH_TOKEN="$TOKEN" gh issue edit "$issue_num" --remove-label "status:in-progress" 2>/dev/null || true
                    GH_TOKEN="$TOKEN" gh api "repos/${{ github.repository }}/issues/$issue_num" \
                      -X PATCH -f state=open 2>/dev/null || true
                    COMMENT=$(printf "đź”´ **Verification failed for wave $CLOSED_WAVE.** Fix the errors and close the issue again.\n\n%b" "$VERIFY_ERRORS")
                    GH_TOKEN="$TOKEN" gh issue comment "$issue_num" --body "$COMMENT"
                    GH_TOKEN="$TOKEN" gh issue edit "$issue_num" --add-label "status:ready" 2>/dev/null || true
                  fi
                done

                if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
                  RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  MSG=$(printf '%s\n' \
                    "đź”´ *VerificaciĂłn fallĂł en wave ${CLOSED_WAVE} â€” issues re-abiertos*" \
                    "â€˘ Repo: \`${REPO_NAME}\`" \
                    "â€˘ Wave: ${CLOSED_WAVE}" \
                    "â€˘ Issues re-abiertos con contexto de error" \
                    "â€˘ Los agentes re-intentarĂˇn con el error" \
                    "â€˘ Run: <${RUN_URL}|ver ejecuciĂłn>")
                  curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                    -H "Content-Type: application/json" \
                    -d "{\"text\": $(echo "$MSG" | jq -Rs .)}" || true
                fi
              fi

            else
              # auto gate: unlock next wave immediately
              for issue_num in $NEXT_ISSUES; do
                GH_TOKEN="$TOKEN" gh issue edit "$issue_num" \
                  --remove-label "status:blocked" \
                  --add-label "status:ready" 2>/dev/null || true
              done
            fi

            exit 0
          fi

          echo "::error::Unsupported mode: $MODE"
          exit 1

name: Gate Orchestrator

# Reusable workflow that centralizes gate logic for both triggers:
# - issue-closed: checks wave completion and requests gate approval or unlocks next wave
# - gate-approved: unlocks next wave and closes gate issue

on:
  workflow_call:
    inputs:
      mode:
        description: "Execution mode: issue-closed or gate-approved"
        type: string
        required: true
      issue-number:
        description: "Issue number to process (closed issue or gate issue depending on mode)"
        type: string
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  orchestrate:
    name: Run gate orchestration
    runs-on: ubuntu-latest
    concurrency:
      group: gate-orchestrator-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout (caller's repo)
        uses: actions/checkout@v4

      - name: Execute mode
        env:
          GH_TOKEN: ${{ github.token }}
          GH_PAT_PORTAL: ${{ secrets.GH_PAT_PORTAL }}
          MODE: ${{ inputs.mode }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          CONFIG=".github/pipeline-config.json"
          TOKEN="${GH_PAT_PORTAL:-$GH_TOKEN}"
          REPO_NAME=$(basename "${{ github.repository }}")

          if [ "$MODE" = "gate-approved" ]; then
            GATE_ISSUE="$ISSUE_NUMBER"

            GATE_WAVE=""
            for wave in $(jq -r '.waveGates | keys[]' "$CONFIG"); do
              GATE_NUM=$(jq -r ".waveGates[\"$wave\"] // empty" "$CONFIG")
              if [ "$GATE_NUM" = "$GATE_ISSUE" ]; then
                GATE_WAVE="$wave"
                break
              fi
            done

            if [ -z "$GATE_WAVE" ]; then
              TITLE=$(gh issue view "$GATE_ISSUE" --json title --jq '.title')
              GATE_WAVE=$(echo "$TITLE" | grep -oP 'Wave \K\d+' || true)
            fi

            if [ -z "$GATE_WAVE" ]; then
              echo "::error::Cannot determine wave for gate issue #$GATE_ISSUE"
              exit 1
            fi

            NEXT_WAVE=$((GATE_WAVE + 1))
            if ! jq -e ".waves[\"$NEXT_WAVE\"]" "$CONFIG" > /dev/null 2>&1; then
              GH_TOKEN="$TOKEN" gh issue comment "$GATE_ISSUE" --body "🎊 **All waves complete!** No more issues to unlock."
              exit 0
            fi

            # v4: waves can be objects with .issues array, or v3 plain arrays
            NEXT_IS_OBJECT=$(jq -r ".waves[\"$NEXT_WAVE\"] | type" "$CONFIG")
            if [ "$NEXT_IS_OBJECT" = "object" ]; then
              NEXT_ISSUES=$(jq -r ".waves[\"$NEXT_WAVE\"].issues[]" "$CONFIG")
            else
              NEXT_ISSUES=$(jq -r ".waves[\"$NEXT_WAVE\"][]" "$CONFIG")
            fi
            UNLOCKED=""

            for issue_num in $NEXT_ISSUES; do
              GH_TOKEN="$TOKEN" gh issue edit "$issue_num" \
                --remove-label "status:blocked" \
                --add-label "status:ready" 2>/dev/null || true
              UNLOCKED="$UNLOCKED #$issue_num"
            done

            if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
              ISSUE_COUNT=$(echo $UNLOCKED | wc -w | tr -d ' ')
              GATE_URL="https://github.com/${{ github.repository }}/issues/${GATE_ISSUE}"
              RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              MSG=$(cat <<EOF
🚀 *Wave ${NEXT_WAVE} desbloqueada*
• Repo: \`${REPO_NAME}\`
• Gate: <${GATE_URL}|#${GATE_ISSUE}> (aprobada)
• Issues listas: ${ISSUE_COUNT}
• Estado aplicado: \`status:ready\`
• Run: <${RUN_URL}|ver ejecución>
EOF
)
              curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "{\"text\": $(echo "$MSG" | jq -Rs .)}" || true
            fi

            GH_TOKEN="$TOKEN" gh issue comment "$GATE_ISSUE" --body "🚀 **Wave $NEXT_WAVE unlocked!** Issues now ready:$UNLOCKED"
            GH_TOKEN="$TOKEN" gh issue close "$GATE_ISSUE" --reason completed
            exit 0
          fi

          if [ "$MODE" = "issue-closed" ]; then
            CLOSED_ISSUE="$ISSUE_NUMBER"

            # Determine wave for closed issue
            CLOSED_WAVE=""
            for wave in $(jq -r '.waves | keys[]' "$CONFIG"); do
              # v4: waves can be objects with .issues array, or v3 plain arrays
              IS_OBJECT=$(jq -r ".waves[\"$wave\"] | type" "$CONFIG")
              if [ "$IS_OBJECT" = "object" ]; then
                MATCH=$(jq -e ".waves[\"$wave\"].issues | index($CLOSED_ISSUE)" "$CONFIG" 2>/dev/null && echo "yes" || echo "no")
              else
                MATCH=$(jq -e ".waves[\"$wave\"] | index($CLOSED_ISSUE)" "$CONFIG" 2>/dev/null && echo "yes" || echo "no")
              fi
              if [ "$MATCH" = "yes" ]; then
                CLOSED_WAVE="$wave"
                break
              fi
            done

            if [ -z "$CLOSED_WAVE" ]; then
              echo "Issue #$CLOSED_ISSUE not in any wave."
              exit 0
            fi

            # Get issues for this wave (v4 object or v3 array)
            IS_OBJECT=$(jq -r ".waves[\"$CLOSED_WAVE\"] | type" "$CONFIG")
            if [ "$IS_OBJECT" = "object" ]; then
              WAVE_ISSUES=$(jq -r ".waves[\"$CLOSED_WAVE\"].issues[]" "$CONFIG")
            else
              WAVE_ISSUES=$(jq -r ".waves[\"$CLOSED_WAVE\"][]" "$CONFIG")
            fi

            ALL_CLOSED=true
            for issue_num in $WAVE_ISSUES; do
              STATE=$(gh issue view "$issue_num" --json state --jq '.state')
              if [ "$STATE" != "CLOSED" ]; then
                ALL_CLOSED=false
              fi
            done

            if [ "$ALL_CLOSED" != "true" ]; then
              exit 0
            fi

            NEXT_WAVE=$((CLOSED_WAVE + 1))
            if ! jq -e ".waves[\"$NEXT_WAVE\"]" "$CONFIG" > /dev/null 2>&1; then
              exit 0
            fi

            # Get next wave issues (v4 or v3)
            NEXT_IS_OBJECT=$(jq -r ".waves[\"$NEXT_WAVE\"] | type" "$CONFIG")
            if [ "$NEXT_IS_OBJECT" = "object" ]; then
              NEXT_ISSUES=$(jq -r ".waves[\"$NEXT_WAVE\"].issues[]" "$CONFIG")
            else
              NEXT_ISSUES=$(jq -r ".waves[\"$NEXT_WAVE\"][]" "$CONFIG")
            fi

            # Determine gate type for closed wave
            # v4: per-wave gate config; v3 fallback: autonomy.waveGateRequired
            GATE_TYPE=""
            if [ "$IS_OBJECT" = "object" ]; then
              GATE_TYPE=$(jq -r ".waves[\"$CLOSED_WAVE\"].gate // empty" "$CONFIG")
            fi
            if [ -z "$GATE_TYPE" ]; then
              # v3 fallback
              WAVE_GATE_REQUIRED=$(jq -r '.autonomy.waveGateRequired // true' "$CONFIG")
              if [ "$WAVE_GATE_REQUIRED" = "true" ]; then
                GATE_TYPE="human"
              else
                GATE_TYPE="auto"
              fi
            fi

            echo "Wave $CLOSED_WAVE complete. Gate type: $GATE_TYPE"

            if [ "$GATE_TYPE" = "human" ]; then
              # Human gate: notify gate issue, wait for gate:approved
              GATE_ISSUE=$(jq -r ".waveGates[\"$CLOSED_WAVE\"] // empty" "$CONFIG")
              if [ -n "$GATE_ISSUE" ] && [ "$GATE_ISSUE" != "null" ]; then
                NEXT_LIST=$(echo $NEXT_ISSUES | tr ' ' ', ' | sed 's/,/, #/g; s/^/#/')
                BODY="✅ **Wave $CLOSED_WAVE complete!**"
                BODY="$BODY"$'\n\n'"Next wave (Wave $NEXT_WAVE): $NEXT_LIST"
                BODY="$BODY"$'\n\n'"Review, test, then add \`gate:approved\` label to unlock."
                GH_TOKEN="$TOKEN" gh issue comment "$GATE_ISSUE" --body "$BODY"

                if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
                  GATE_URL="https://github.com/${{ github.repository }}/issues/${GATE_ISSUE}"
                  RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  NEXT_COUNT=$(echo $NEXT_ISSUES | wc -w | tr -d ' ')
                  MSG=$(cat <<EOF
🟡 *Acción requerida — gate pendiente*
• Repo: \`${REPO_NAME}\`
• Wave completada: ${CLOSED_WAVE}
• Próxima wave: ${NEXT_WAVE} (${NEXT_COUNT} issues)
• Gate: <${GATE_URL}|#${GATE_ISSUE}>
• Acción: agregar label \`gate:approved\`
• Run: <${RUN_URL}|ver ejecución>
EOF
)
                  curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                    -H "Content-Type: application/json" \
                    -d "{\"text\": $(echo "$MSG" | jq -Rs .)}" || true
                fi
              fi

            elif [ "$GATE_TYPE" = "verify-then-auto" ]; then
              # Run verification hooks, then auto-unlock if pass
              VERIFY_HOOKS=""
              if [ "$IS_OBJECT" = "object" ]; then
                VERIFY_HOOKS=$(jq -r '(.waves["'"$CLOSED_WAVE"'"].verify // []) | .[]' "$CONFIG" 2>/dev/null || true)
              fi

              VERIFY_PASSED=true
              VERIFY_ERRORS=""

              if [ -n "$VERIFY_HOOKS" ]; then
                for hook_name in $VERIFY_HOOKS; do
                  HOOK_CMD=$(jq -r ".verification.hooks[\"$hook_name\"] // empty" "$CONFIG")
                  if [ -z "$HOOK_CMD" ]; then
                    echo "::warning::Verify hook '$hook_name' not found in verification.hooks"
                    continue
                  fi

                  echo "Running verify hook: $hook_name → $HOOK_CMD"
                  set +e
                  HOOK_OUTPUT=$(eval "$HOOK_CMD" 2>&1)
                  HOOK_EXIT=$?
                  set -e

                  if [ "$HOOK_EXIT" -ne 0 ]; then
                    VERIFY_PASSED=false
                    VERIFY_ERRORS="$VERIFY_ERRORS\n### ❌ \`$hook_name\` failed (exit $HOOK_EXIT)\n\`\`\`\n$(echo "$HOOK_OUTPUT" | tail -50)\n\`\`\`\n"
                  else
                    echo "✅ $hook_name passed"
                  fi
                done
              fi

              if [ "$VERIFY_PASSED" = "true" ]; then
                # All hooks passed — auto-unlock next wave
                for issue_num in $NEXT_ISSUES; do
                  GH_TOKEN="$TOKEN" gh issue edit "$issue_num" \
                    --remove-label "status:blocked" \
                    --add-label "status:ready" 2>/dev/null || true
                done

                if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
                  NEXT_COUNT=$(echo $NEXT_ISSUES | wc -w | tr -d ' ')
                  RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  MSG=$(cat <<EOF
🟢 *Wave ${NEXT_WAVE} auto-desbloqueada (verificación OK)*
• Repo: \`${REPO_NAME}\`
• Wave completada: ${CLOSED_WAVE}
• Verificación: todas las hooks pasaron
• Issues listas: ${NEXT_COUNT}
• Run: <${RUN_URL}|ver ejecución>
EOF
)
                  curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                    -H "Content-Type: application/json" \
                    -d "{\"text\": $(echo "$MSG" | jq -Rs .)}" || true
                fi

                # Close gate issue if exists
                GATE_ISSUE=$(jq -r ".waveGates[\"$CLOSED_WAVE\"] // empty" "$CONFIG")
                if [ -n "$GATE_ISSUE" ] && [ "$GATE_ISSUE" != "null" ]; then
                  GH_TOKEN="$TOKEN" gh issue comment "$GATE_ISSUE" --body "🟢 **Wave $CLOSED_WAVE verified and auto-approved.** Wave $NEXT_WAVE unlocked."
                  GH_TOKEN="$TOKEN" gh issue close "$GATE_ISSUE" --reason completed 2>/dev/null || true
                fi
              else
                # Verification failed — re-open wave issues with error context for agents to fix
                printf "Verification failed for wave $CLOSED_WAVE. Errors:\n$VERIFY_ERRORS"

                for issue_num in $WAVE_ISSUES; do
                  STATE=$(gh issue view "$issue_num" --json state --jq '.state')
                  if [ "$STATE" = "CLOSED" ]; then
                    GH_TOKEN="$TOKEN" gh issue edit "$issue_num" --remove-label "status:in-progress" 2>/dev/null || true
                    GH_TOKEN="$TOKEN" gh api "repos/${{ github.repository }}/issues/$issue_num" \
                      -X PATCH -f state=open 2>/dev/null || true
                    COMMENT=$(printf "🔴 **Verification failed for wave $CLOSED_WAVE.** Fix the errors and close the issue again.\n\n%b" "$VERIFY_ERRORS")
                    GH_TOKEN="$TOKEN" gh issue comment "$issue_num" --body "$COMMENT"
                    GH_TOKEN="$TOKEN" gh issue edit "$issue_num" --add-label "status:ready" 2>/dev/null || true
                  fi
                done

                if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
                  RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  MSG=$(cat <<EOF
🔴 *Verificación falló en wave ${CLOSED_WAVE} — issues re-abiertos*
• Repo: \`${REPO_NAME}\`
• Wave: ${CLOSED_WAVE}
• Issues re-abiertos con contexto de error
• Los agentes re-intentarán con el error
• Run: <${RUN_URL}|ver ejecución>
EOF
)
                  curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                    -H "Content-Type: application/json" \
                    -d "{\"text\": $(echo "$MSG" | jq -Rs .)}" || true
                fi
              fi

            else
              # auto gate: unlock next wave immediately
              for issue_num in $NEXT_ISSUES; do
                GH_TOKEN="$TOKEN" gh issue edit "$issue_num" \
                  --remove-label "status:blocked" \
                  --add-label "status:ready" 2>/dev/null || true
              done
            fi

            exit 0
          fi

          echo "::error::Unsupported mode: $MODE"
          exit 1
